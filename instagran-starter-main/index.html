<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://firebasestorage.googleapis.com/v0/b/dcit-web.appspot.com/o/a2main.css.css?alt=media&token=372ab3f9-ae18-4058-83ce-2253593a0555">

    <style>

        body{
    width:100%;
    margin:0;
    padding:0;
    background:#fafafa;
}

/* NAVBAR */
nav{
    width:100%;
    height:54px;
    background:white;
    border-bottom:1px solid #e5e5e5;
    position:relative;
}

/* LOGO */
#logo{
    height:40px;
    position:relative;
    top:7px;
    left:10px;
}

/* SEARCH BOX */
nav input{
    height:25px;
    width:30vw;
    background:#fafafa;
    border:1px solid #b5b5b5;
    border-radius:3px;
    text-align:center;

    position:absolute;
    left:35vw;
    right:35vw;
    top:12px;
}

/* ACTION ICONS */
#actions{
    height:40px;
    position:absolute;
    right:10px;
    top:7px;
}

/* STORIES SECTION */
#stories{
    height:90px;
    width:70vw;

    margin-top:-5px;
    margin-left:auto;
    margin-right:auto;

    border:1px solid #b5b5b5;
    border-radius:2px;

    padding-left:30px;
}

/* USER STORY */
.user{
    width:18%;
    display:inline-block;
}

/* STORY IMAGES */
.user img{
    width:56px;
    height:56px;

    margin-top:5px;

    border-radius:50%;
    border:4px double #b5b5b5;

    display:block;
    margin-left:auto;
    margin-right:auto;
}

/* USER NAME */
.user p{
    text-align:center;
    margin:0;
    font-family:"Lucida Sans Unicode";
    font-weight:100;
    font-size:smaller;
}

/* POST */
.post{
    width:560px;
    height:60vh;

    border:1px solid #b5b5b5;
    border-radius:2px;

    margin-left:auto;
    margin-right:auto;
    margin-top:10px;
}

/* POST HEADER */
.post-header{
    background:white;
    height:50px;

    padding:5px;

    border-bottom:1px solid #b5b5b5;
}

/* POST IMAGE */
.post-image{
    width:100%;
    align-items:center ;
}
      
    </style>
</head>
<body>
    <nav>
       
        <img id="logo" src="img/instagran.png" alt="instagran logo" >
    
        <input type="text" placeholder="search"/>

        <img id="actions" src="img/actions.png" alt="actions" >
    </nav>

    <section id="stories">
        <div class="user" id="mydiv">
            <img src="img/gran1.jpg" >
            <p class="userstory">Elma</p>
        </div>
        <div class="user">
            <img src="img/gran2.jpg" >
            <p class="userstory">Betty</p>
        </div>
        <div class="user">
            <img src="img/gran3.jpg" >
            <p class="userstory">Sandra</p>
        </div>
        <div class="user">
            <img src="img/gran4.jpg" >
            <p class="userstory">Delores</p>
        </div>

        <div class="user">
            <img src="img/gran5.jpg" >
            <p class="userstory">Karen</p>
        </div>
    </section>

    <section class="post">
        <div class="post-header">
            <img src="img/gran1.jpg"><span>Elma</span>
        </div>
        <div>
            <img class="post-image" src="https://www.placecage.com/g/512/512" alt="cage image">
        </div>
    </section>

    <footer></footer>
</body>
</html>
